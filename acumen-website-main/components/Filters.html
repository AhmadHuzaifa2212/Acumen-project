<div class="bg-white p-6 rounded-lg shadow-lg mb-8">
    <h3 class="text-xl font-bold text-gray-800 mb-4">Filters</h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Price Range Filter -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Price Range (₹)</label>
            <div id="priceFilter" class="flex flex-wrap gap-2">
                <button data-price="10000" class="price-btn border border-gray-300 px-3 py-1 rounded-md text-sm hover:bg-blue-100">Up to 10k</button>
                <button data-price="25000" class="price-btn border border-gray-300 px-3 py-1 rounded-md text-sm hover:bg-blue-100">Up to 25k</button>
                <button data-price="50000" class="price-btn border border-gray-300 px-3 py-1 rounded-md text-sm hover:bg-blue-100">Up to 50k</button>
                <button data-price="80000" class="price-btn border border-gray-300 px-3 py-1 rounded-md text-sm hover:bg-blue-100">50k+</button>
            </div>
        </div>

        <!-- Rating Filter -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Rating</label>
            <div id="ratingFilter" class="flex flex-wrap gap-2">
                <button data-rating="1" class="rating-btn border border-gray-300 px-3 py-1 rounded-md text-sm hover:bg-blue-100">1+ Star</button>
                <button data-rating="2" class="rating-btn border border-gray-300 px-3 py-1 rounded-md text-sm hover:bg-blue-100">2+ Stars</button>
                <button data-rating="3" class="rating-btn border border-gray-300 px-3 py-1 rounded-md text-sm hover:bg-blue-100">3+ Stars</button>
                <button data-rating="4" class="rating-btn border border-gray-300 px-3 py-1 rounded-md text-sm hover:bg-blue-100">4+ Stars</button>
                <button data-rating="5" class="rating-btn border border-gray-300 px-3 py-1 rounded-md text-sm hover:bg-blue-100">5 Stars</button>
            </div>
        </div>

        <!-- Hotel Type Filter -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Hotel Type</label>
            <div id="typeFilter" class="space-y-2">
                <label class="flex items-center">
                    <input type="checkbox" value="Hotel" class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                    <span class="ml-2 text-sm text-gray-600">Hotel</span>
                </label>
                <label class="flex items-center">
                    <input type="checkbox" value="Resort" class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                    <span class="ml-2 text-sm text-gray-600">Resort</span>
                </label>
                <label class="flex items-center">
                    <input type="checkbox" value="Villa" class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                    <span class="ml-2 text-sm text-gray-600">Villa</span>
                </label>
                 <label class="flex items-center">
                    <input type="checkbox" value="Apartment" class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                    <span class="ml-2 text-sm text-gray-600">Apartment</span>
                </label>
            </div>
        </div>
        
        <!-- Location Filter -->
        <div>
            <label for="locationFilter" class="block text-sm font-medium text-gray-700 mb-2">Location</label>
            <select id="locationFilter" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">All</option>
            </select>
        </div>
    </div>
</div>
