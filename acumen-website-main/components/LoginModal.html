<div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-xl shadow-lg w-full max-w-sm sm:max-w-md p-6 relative max-h-[90vh] overflow-y-auto">
    <!-- Close button -->
    <button id="closeLoginBtn" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 p-1 transition-colors">
      <span class="material-icons text-xl">close</span>
    </button>

    <!-- Tabs -->
    <div class="flex justify-center mb-6">
      <button id="tabLogin" class="w-1/2 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600 transition-colors">Login</button>
      <button id="tabSignup" class="w-1/2 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-blue-600 transition-colors">Signup</button>
    </div>

    <!-- Success/Error Messages -->
    <div id="loginMessage" class="hidden text-center mb-4 text-sm"></div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-4">
      <input type="email" id="loginEmail" placeholder="Email" required
        class="w-full px-4 py-3 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
      
      <input type="password" id="loginPassword" placeholder="Password" required
        class="w-full px-4 py-3 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />

      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium">
        Login
      </button>
    </form>

    <!-- Signup Form (hidden by default) -->
    <form id="signupForm" class="space-y-4 hidden">
      <input type="text" id="signupName" placeholder="Full Name" required
        class="w-full px-4 py-3 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />

      <input type="email" id="signupEmail" placeholder="Email" required
        class="w-full px-4 py-3 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
      
      <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required
        class="w-full px-4 py-3 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />

      <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition-colors text-sm font-medium">
        Signup
      </button>
    </form>
  </div>
</div>
